name: BoardApp
options:
  bundleIdPrefix: com.khsbory
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true
  developmentLanguage: ko
settings:
  INFOPLIST_FILE: App/Info.plist
  MARKETING_VERSION: "1.0"
  CURRENT_PROJECT_VERSION: "1"
targets:
  BoardApp:
    type: application
    platform: iOS
    sources:
      - path: App
      - path: Shared
      - path: UIKitSeparate
      - path: UIKitSingle
      - path: SwiftUISeparate
      - path: SwiftUISingle
    settings:
      INFOPLIST_FILE: App/Info.plist
      PRODUCT_BUNDLE_IDENTIFIER: com.khsbory.boardapp
      PRODUCT_NAME: "게시판 접근성 테스트"
      PRODUCT_MODULE_NAME: BoardApp
      INFOPLIST_KEY_CFBundleDisplayName: "게시판 접근성 테스트"
      DEVELOPMENT_LANGUAGE: ko
  BoardAppTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: ../BoardAppTests
    dependencies:
      - target: BoardApp
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.khsbory.boardapp.tests
      PRODUCT_NAME: BoardAppTests
      PRODUCT_MODULE_NAME: BoardAppTests
      TEST_HOST: "$(BUILT_PRODUCTS_DIR)/게시판 접근성 테스트.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/게시판 접근성 테스트"
      BUNDLE_LOADER: "$(TEST_HOST)"
  BoardAppUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: ../BoardAppUITests
    dependencies:
      - target: BoardApp
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.khsbory.boardapp.uitests
      PRODUCT_NAME: BoardAppUITests
      PRODUCT_MODULE_NAME: BoardAppUITests
schemes:
  BoardApp:
    build:
      targets:
        BoardApp: all
        BoardAppTests: [test]
        BoardAppUITests: [test]
    test:
      targets:
        - BoardAppTests
        - BoardAppUITests
